<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>login</title>
</head>
<body>
    <form method="post" action="{% url 'KakaoAPI:login' %}">
        {% csrf_token %}
        <h3>아이디</h3>
        <input type="text" name="username" required> <br>
        <h3>비밀번호</h3>
        <input type="password" name="password" required> <br><br>
        <button type="submit">로그인</button>
    </form> <br><hr>

    <a href="{% url 'KakaoAPI:main' %}">메인으로</a>
</body>
</html>
